name: Generate Check

on:
  pull_request:
    paths:
      - '**.go'
      - go.mod
      - go.sum
      - examples/**
      - templates/**
      - .github/workflows/generate-check.yml

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Generate documentation
        run: make generate

      - name: Check for uncommitted changes
        run: |
          git diff --compact-summary --exit-status || \
            (echo; echo "Documentation is out of date. Run 'make generate' and commit the changes."; exit 1)
